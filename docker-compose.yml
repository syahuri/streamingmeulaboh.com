services:
  streamingmeulaboh:
    build: .
    container_name: streamingmeulaboh
    restart: unless-stopped
    ports:
      - "8093:80"
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  coolify:
    external: true
