server {
    listen 80;
    server_name streamingmeulaboh.com www.streamingmeulaboh.com _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Clean URLs: /layanan → layanan.html
    location /layanan {
        try_files $uri $uri/ /layanan.html;
    }
    location /portofolio {
        try_files $uri $uri/ /portofolio.html;
    }
    location /harga {
        try_files $uri $uri/ /harga.html;
    }
    location /tentang {
        try_files $uri $uri/ /tentang.html;
    }

    # robots.txt and sitemap.xml
    location = /robots.txt { access_log off; }
    location = /sitemap.xml { access_log off; }

    # SPA fallback
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Disable access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
